# Build the image from the repo Dockerfile and push to Docker Hub on every push to `main`.
#
# Repository secrets (Settings -> Secrets and variables -> Actions):
# DOCKERHUB_USERNAME - Docker Hub username or org
# DOCKERHUB_TOKEN - Access token (recommended), not your account password
# HUNTAI_K3S_PAT - PAT with contents:write on taixingbi/huntai-k3s (GitOps image pin)
#
# Images: /<user>/layer-gateway-reranker-v1:latest, :<ci-version>, and :<git-sha>
name: Push to Docker Hub

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Optional explicit version tag (for example: 0.1.0 or v0.1.0)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: docker-push-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  push:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ github.event.inputs.version || '' }}"
          if [ -n "${INPUT_VERSION}" ]; then
            VERSION="${INPUT_VERSION}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="${GITHUB_SHA::12}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/layer-gateway-reranker-v1:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/layer-gateway-reranker-v1:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/layer-gateway-reranker-v1:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops:
    needs: push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: gitops-gateway-reranker-${{ github.sha }}
      cancel-in-progress: false
    steps:
      - name: Checkout huntai-k3s
        uses: actions/checkout@v4
        with:
          repository: taixingbi/huntai-k3s
          token: ${{ secrets.HUNTAI_K3S_PAT }}
          path: huntai-k3s

      - name: Update gateway-reranker image tag
        env:
          TAG: ${{ needs.push.outputs.version }}
        working-directory: huntai-k3s
        shell: bash
        run: |
          set -euo pipefail
          KUSTOMIZE_FILE="manifests/gateway-reranker/overlays/dev/kustomization.yaml"
          LEGACY_FILE="manifests/gateway/layer-gateway-reranker-dev.yaml"
          EXPECTED="docker.io/taixingbi/layer-gateway-reranker-v1"
          if [ -f "${KUSTOMIZE_FILE}" ]; then
            TARGET_FILE="${KUSTOMIZE_FILE}"
            TARGET_MODE="kustomize"
            if ! grep -q '^images:' "${KUSTOMIZE_FILE}"; then
              echo "Missing images: block in ${KUSTOMIZE_FILE} (push huntai-k3s GitOps overlay first)" >&2
              exit 1
            fi
            ACTUAL="$(grep -E '^\s+-\s+name:' "${KUSTOMIZE_FILE}" | head -1 | sed -E 's/^[[:space:]]*-[[:space:]]*name:[[:space:]]*//;s/"//g;s/[[:space:]]*$//')"
            if [ "${ACTUAL}" != "${EXPECTED}" ]; then
              echo "Unexpected images[0].name: '${ACTUAL}' (expected '${EXPECTED}')" >&2
              exit 1
            fi
            if ! grep -qE '^[[:space:]]*newTag:' "${KUSTOMIZE_FILE}"; then
              echo "Missing newTag in ${KUSTOMIZE_FILE}" >&2
              exit 1
            fi
            sed -i -E "s|^([[:space:]]*newTag:[[:space:]]*).*$|\1\"${TAG}\"|" "${KUSTOMIZE_FILE}"
            grep -q "newTag: \"${TAG}\"" "${KUSTOMIZE_FILE}" || {
              echo "newTag was not updated to ${TAG}" >&2
              exit 1
            }
          elif [ -f "${LEGACY_FILE}" ]; then
            TARGET_FILE="${LEGACY_FILE}"
            TARGET_MODE="legacy"
            if ! grep -qE "^[[:space:]]*image:[[:space:]]*${EXPECTED}:" "${LEGACY_FILE}"; then
              echo "Expected image line not found in ${LEGACY_FILE}" >&2
              exit 1
            fi
            sed -i -E "s|^([[:space:]]*image:[[:space:]]*${EXPECTED}:).*$|\1${TAG}|" "${LEGACY_FILE}"
            grep -q "${EXPECTED}:${TAG}" "${LEGACY_FILE}" || {
              echo "image was not updated to ${EXPECTED}:${TAG}" >&2
              exit 1
            }
          else
            echo "Missing both ${KUSTOMIZE_FILE} and ${LEGACY_FILE}" >&2
            exit 1
          fi
          printf '%s\n' "${TARGET_FILE}" > .gitops-target-file
          printf '%s\n' "${TARGET_MODE}" > .gitops-target-mode

      - name: Commit and push
        working-directory: huntai-k3s
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No manifest change; skip commit"
            exit 0
          fi
          TARGET_FILE="$(sed -n '1p' .gitops-target-file)"
          TARGET_MODE="$(sed -n '1p' .gitops-target-mode)"
          git add "${TARGET_FILE}"
          if [ "${TARGET_MODE}" = "legacy" ]; then
            git commit -m "chore(gateway-reranker-dev): pin legacy image ${{ needs.push.outputs.version }}"
          else
            git commit -m "chore(gateway-reranker-dev): pin image ${{ needs.push.outputs.version }}"
          fi
          git push origin HEAD:main
